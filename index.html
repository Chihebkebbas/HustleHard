<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Pro | Welcome</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .cta-button {
            display: inline-block;
            background: var(--primary-gradient);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .cta-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }

        .features {
            display: flex;
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-badge {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="hero">
        <div class="animate-fade-in">
            <h1>Rat Pro<br><span style="color: var(--accent); -webkit-text-fill-color: var(--accent);">Advanced</span>
                Solution</h1>
            <p>L'outil de gestion ultime pour les développeurs d'élite. Optimisez votre workflow avec un design premium.
            </p>

            <a href="dashboard.html" class="cta-button">Accéder au Dashboard</a>

            <div class="features">
                <div class="feature-badge">⚡ Ultra Rapide</div>
                <div class="feature-badge">💎 Design Premium</div>
                <div class="feature-badge">🔒 Sécurisé</div>
            </div>
        </div>
    </div>
</body>

</html>
